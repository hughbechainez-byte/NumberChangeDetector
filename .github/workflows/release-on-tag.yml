name: Build and release prototype APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build and test
        run: |
          chmod +x ./gradlew
          ./gradlew clean :scanner:test :prototype:testDebugUnitTest :prototype:lintDebug :prototype:assembleDebug :prototype:assembleRelease
      - name: Prepare APK
        id: artifact
        run: |
          mkdir -p dist
          cp prototype/build/outputs/apk/release/prototype-release.apk "dist/CompilationMaker-Prototype-${GITHUB_REF_NAME}.apk"
          echo "apk=dist/CompilationMaker-Prototype-${GITHUB_REF_NAME}.apk" >> "$GITHUB_OUTPUT"
      - name: Publish release asset
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: "CompilationMaker Number Detector Prototype ${{ github.ref_name }}"
          artifacts: ${{ steps.artifact.outputs.apk }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          makeLatest: true
          generateReleaseNotes: true
          body: "CompilationMaker prototype with the sparse PTS-aware number-change scanner integrated. This separately packaged tester build does not update or replace the production CompilationMaker app."
